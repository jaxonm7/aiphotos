<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Image Generator</title>

<style>
body{
font-family: Arial, sans-serif;
background:#111827;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1f2937;
padding:30px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

h1{
margin-top:0;
font-size:24px;
}

input{
width:90%;
padding:12px;
border-radius:6px;
border:none;
margin-top:10px;
font-size:15px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#loading{
display:none;
margin-top:20px;
}

.progress{
width:100%;
height:12px;
background:#374151;
border-radius:6px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.3s;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
background:black;
}
</style>
</head>

<body>

<div class="container" id="app">

<h1>AI Photo Generator</h1>
<p>Enter a prompt to generate an AI image</p>

<input id="prompt" placeholder="A dragon flying over a cyberpunk city">

<br>

<button onclick="startGeneration()">Generate</button>

<div id="loading">
<p>Generating image...</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="percent">0%</p>

</div>

</div>

<video id="rickroll" autoplay controls>
<source src="YTDown.com_YouTube_Rick-Astley-Never-Gonna-Give-You-Up-Offi_Media_dQw4w9WgXcQ_001_1080p (online-video-cutter.com) (1).mp4" type="video/mp4">
</video>

<script>

function startGeneration(){

let prompt=document.getElementById("prompt").value;

if(prompt.trim()===""){
alert("Please enter a prompt");
return;
}

document.getElementById("loading").style.display="block";

let bar=document.getElementById("bar");
let percentText=document.getElementById("percent");

let progress=0;

let interval=setInterval(function(){

progress+=4;

bar.style.width=progress+"%";
percentText.innerText=progress+"%";

if(progress>=100){

clearInterval(interval);

document.getElementById("app").style.display="none";

let video=document.getElementById("rickroll");
video.style.display="block";
video.play();

}

},120);

}

</script>

</body>
</html>
