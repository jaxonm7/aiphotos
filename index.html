<!DOCTYPE html>
<html>
<head>
<title>AI Photo Generator</title>

<style>
body{
font-family:Arial;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:30px;
border-radius:12px;
width:420px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.generate{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#3b82f6;
border-radius:6px;
cursor:pointer;
}

/* hide checkbox */
#trigger{
display:none;
}

/* video hidden initially */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
background:black;
}

/* when button clicked show video */
#trigger:checked ~ video{
display:block;
}

/* hide generator when triggered */
#trigger:checked ~ .container{
display:none;
}
</style>

</head>

<body>

<input type="checkbox" id="trigger">

<div class="container">
<h2>AI Photo Generator</h2>
<p>Describe the image you want</p>

<input placeholder="A dragon flying over a city">

<br>

<label for="trigger" class="generate">Generate</label>

</div>

<video controls>
<source src="rickroll.mp4" type="video/mp4">
</video>

</body>
</html>
