<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>17 Second Generator</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:30px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

input{
width:90%;
padding:12px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

#loading{
display:none;
margin-top:20px;
}

.progress{
width:100%;
height:12px;
background:#374151;
border-radius:6px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.2s;
}

#image{
display:none;
margin-top:20px;
}

#image img{
width:100%;
border-radius:8px;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
background:black;
}

</style>

</head>

<body>

<div class="container" id="app">

<h2>17 Second Generator</h2>

<input id="prompt" placeholder="Astronaut riding a dragon">

<br>

<button onclick="start()">Generate</button>

<div id="loading">

<p>Generating image...</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<div id="image">
<img src="https://picsum.photos/500/300">
</div>

</div>

<video id="rickroll">
<source src="rickroll.mp4" type="video/mp4">
</video>

<script>

function start(){

let prompt=document.getElementById("prompt").value;

if(prompt.trim()==""){
alert("Enter a prompt first");
return;
}

document.getElementById("loading").style.display="block";

let bar=document.getElementById("bar");
let progress=0;

let interval=setInterval(function(){

progress+=5;

bar.style.width=progress+"%";

if(progress>=100){

clearInterval(interval);

document.getElementById("loading").style.display="none";
document.getElementById("image").style.display="block";

setTimeout(function(){

document.getElementById("app").style.display="none";

let video=document.getElementById("rickroll");
video.style.display="block";
video.play();

},1500);

}

},120);

}

</script>

</body>
</html>
